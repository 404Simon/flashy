name: CI

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DATABASE_URL: sqlite:flashy.db

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tools
        run: cargo binstall sqlx-cli cargo-leptos --no-confirm --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Create database and run migrations
        run: |
          sqlx database create
          sqlx migrate run

      - name: Run tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build with cargo-leptos
        run: cargo leptos build --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: leptos-build
          path: |
            target/release/flashy
            target/site/
          retention-days: 3

  security-audit:
    name: Security Audit

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm --locked

      - name: Run security audit
        run: cargo audit
