name: CI

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DATABASE_URL: sqlite:flashy.db

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install CI tools
        run: cargo binstall sqlx-cli cargo-leptos cargo-audit --no-confirm --locked --force

      - name: Verify installed tools
        run: |
          which cargo-leptos
          which cargo-audit
          cargo leptos --version
          cargo audit --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run security audit
        run: cargo audit

      - name: Create database and run migrations
        run: |
          sqlx database create
          sqlx migrate run

      - name: Run tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build with cargo-leptos
        run: cargo leptos build --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: leptos-build
          path: |
            target/release/flashy
            target/site/
          retention-days: 3
